<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VeloTransit - Choose Your Seat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .premium-card { background-color: #ffffff; border: 1px solid #dee2e6; border-radius: 12px; }

    .seat-grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
      gap: 10px;
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
    }
    .seat {
      height: 46px;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      user-select: none;
    }
    .seat.available {
      background-color: #e2f0d9; color: #385723; border: 1px solid #c5e1b4; cursor: pointer;
    }
    .seat.available:hover {
      background-color: #0d6efd; color: #ffffff; border-color: #0d6efd; transform: scale(1.05);
    }
    .seat.booked {
      background-color: #fce4d6; color: #c65911; border: 1px solid #f8cbad; cursor: not-allowed; opacity: 0.65;
    }
    .seat.selected {
      background-color: #0d6efd; color: #ffffff !important; border-color: #0d6efd; box-shadow: 0 0 8px rgba(13, 110, 253, 0.4);
    }
    .btn-success { padding: 12px 24px; font-weight: 600; border-radius: 6px; }
  </style>
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="premium-card p-4 shadow-sm">
        <div class="border-bottom pb-3 mb-4">
          <h4 id="route-title" class="fw-bold m-0 text-dark">Select Your Seat</h4>
          <p class="text-muted small m-0">Click any green box below to pick your seat coordinate.</p>
        </div>

        <!-- Layout Grid Map -->
        <div id="seat-grid" class="seat-grid-container p-4 rounded mb-4"></div>

        <div class="row align-items-center bg-light p-3 rounded border mx-1">
          <div class="col-sm-6 text-center text-sm-start mb-3 mb-sm-0">
            <span class="text-muted small d-block">Selected Seat Node</span>
            <span class="fw-bold text-dark fs-5">Seat Number: <span id="selected-seat-text" class="text-primary">None</span></span>
          </div>
          <div class="col-sm-6 text-center text-sm-end">
            <button id="confirm-btn" class="btn btn-success px-4 w-100" onclick="bookSeat()" disabled>Confirm Booking</button>
          </div>
        </div>

        <div id="msg" class="mt-3"></div>
        <div class="mt-4 text-center">
          <a href="search.html" class="text-secondary text-decoration-none small">&larr; Return to Routes Panel</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const routeId = urlParams.get('routeId');
  const capacity = parseInt(urlParams.get('capacity'));
  const source = urlParams.get('from');
  const destination = urlParams.get('to');
  const token = localStorage.getItem('jwt');
  let selectedSeat = null;

  if (!token || !routeId) { window.location.href = 'login.html'; }

  document.getElementById('route-title').innerText = `Select Seat: ${source} ➔ ${destination}`;

  async function generateSeatGrid() {
    const grid = document.getElementById('seat-grid');
    grid.innerHTML = '<div class="w-100 text-center py-3"><div class="spinner-border text-primary"></div></div>';

    try {
      const bookedRes = await fetch(`http://localhost:8081/tickets/booked-seats/${routeId}`, {
          headers: { 'Authorization': 'Bearer ' + token }
      });
      const bookedSeats = await bookedRes.json();
      grid.innerHTML = '';

      for (let i = 1; i <= capacity; i++) {
        const seatEl = document.createElement('div');
        const seatNum = `S${i}`;
        seatEl.innerText = seatNum;
        seatEl.classList.add('seat');

        if (bookedSeats.includes(seatNum)) {
          seatEl.classList.add('booked');
        } else {
          seatEl.classList.add('available');
          seatEl.onclick = () => selectSeat(seatEl, seatNum);
        }
        grid.appendChild(seatEl);
      }
    } catch(err) {
      grid.innerHTML = `<div class="text-danger p-3">Failed loading available seat data matrix.</div>`;
    }
  }

  function selectSeat(element, seatNum) {
      const currentSelected = document.querySelector('.seat.selected');
      if(currentSelected) currentSelected.classList.remove('selected');

      element.classList.add('selected');
      selectedSeat = seatNum;
      document.getElementById('selected-seat-text').innerText = selectedSeat;
      document.getElementById('confirm-btn').disabled = false;
  }

  async function bookSeat() {
      if (!selectedSeat) return;
      const msgEl = document.getElementById('msg');
      msgEl.innerHTML = '';
      document.getElementById('confirm-btn').disabled = true;

      try {
        const res = await fetch('http://localhost:8081/tickets', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
            body: JSON.stringify({ routeId: Number(routeId), seatNo: selectedSeat })
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || "Booking request dropped by validation layer.");
        }
        const data = await res.json();
        window.location.href = `confirm.html?ticketId=${data.id}`;
      } catch (e) {
        msgEl.innerHTML = `<div class="alert alert-danger">${e.message}</div>`;
        document.getElementById('confirm-btn').disabled = false;
        generateSeatGrid();
      }
  }
  document.addEventListener('DOMContentLoaded', generateSeatGrid);
</script>
</body>
</html>
