<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transport Booking - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow">
        <div class="card-body p-4">
          <h4 class="text-center mb-4">User Login</h4>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input id="username" class="form-control" value="user">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" value="user">
          </div>
          <button class="btn btn-primary w-100" onclick="login()">Login</button>
          <div class="mt-3 text-center">
            <a href="signup.html">Create a new account</a>
          </div>
          <hr>
          <div class="text-center">
            <a href="admin-login.html" class="link-secondary">Admin Login</a>
          </div>
          <div id="msg" class="mt-3 text-danger small text-center"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  async function login() {
    const msgEl = document.getElementById('msg');
    msgEl.innerText = '';
    try {
      // Directing explicitly to your running ticket-service backend instance
      const res = await fetch('http://localhost:8081/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
      });

      // 1. Intercept bad credentials right away before checking body format
      if (res.status === 401) {
          throw new Error('Wrong password or username!');
      }

      // 2. Read raw response text safely to avoid JSON structure parsing exceptions
      const responseText = await res.text();
      let data = {};

      if (responseText) {
          try {
              data = JSON.parse(responseText);
          } catch(jsonErr) {
              throw new Error('Server responded with invalid data format.');
          }
      }

      // 3. Catch all other network problems (like a 400 or 500 error)
      if (!res.ok) {
          throw new Error(data.message || `Login failed with status code ${res.status}`);
      }

      // 4. Handle token assignment and redirection smoothly
      if (data.token) {
        localStorage.setItem('jwt', data.token);
        window.location.href = 'search.html';
      } else {
          throw new Error('Access token missing from validation context.');
      }
    } catch(e) {
      msgEl.innerText = e.message;
    }
  }
</script>
</body>
</html>
