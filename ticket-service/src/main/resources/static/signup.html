<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VeloTransit - Create Account</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
    .signup-card { border-radius: 12px; border: 1px solid #dee2e6; background-color: #ffffff; }
    .btn-primary { padding: 11px; font-weight: 600; border-radius: 6px; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card signup-card p-3 shadow-sm">
        <div class="card-body">
          <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Create Account</h3>
            <p class="text-muted small">Register for free to start booking tickets</p>
          </div>
          <div class="mb-3">
            <label class="form-label font-monospace small text-uppercase">Username</label>
            <input id="username" class="form-control" placeholder="Choose a username">
          </div>
          <div class="mb-4">
            <label class="form-label font-monospace small text-uppercase">Password</label>
            <input id="password" type="password" class="form-control" placeholder="Choose a password">
          </div>
          <button class="btn btn-primary w-100" onclick="register()">Create Account</button>
          <div id="msg" class="mt-3 text-danger text-center small fw-semibold"></div>
          <div class="mt-4 text-center small">
            <a href="login.html" class="text-decoration-none fw-bold">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  async function register() {
    const msgEl = document.getElementById('msg');
    msgEl.innerText = '';
    try {
        const res = await fetch('http://localhost:8081/register', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.message || 'Registration failed');
        }
        const data = await res.json();
        if (data.message) {
            alert('Registered successfully. Please login.');
            window.location.href = 'login.html';
        }
    } catch(e) {
        msgEl.innerText = e.message;
    }
  }
</script>
</body>
</html>
