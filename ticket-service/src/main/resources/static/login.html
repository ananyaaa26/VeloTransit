<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VeloTransit - User Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 12px; border: 1px solid #dee2e6; background-color: #ffffff; }
        .btn-primary { padding: 11px; font-weight: 600; border-radius: 6px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card login-card p-3 shadow-sm">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">VeloTransit</h3>
                        <p class="text-muted small">Sign in to your passenger account</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-monospace small text-uppercase">Username</label>
                        <input id="username" class="form-control" value="user" placeholder="Enter your username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label font-monospace small text-uppercase">Password</label>
                        <input id="password" type="password" class="form-control" value="user" placeholder="Enter your password">
                    </div>
                    <button class="btn btn-primary w-100" onclick="login()">Login</button>

                    <div class="mt-4 text-center small">
                        <span class="text-muted">Don't have an account?</span> <a href="signup.html" class="text-decoration-none fw-bold">Sign Up</a>
                    </div>
                    <div class="mt-2 text-center">
                        <a href="index.html" class="text-secondary text-decoration-none small">&larr; Back to Home</a>
                    </div>
                    <div id="msg" class="mt-3 text-danger small text-center fw-semibold"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    async function login() {
      const msgEl = document.getElementById('msg');
      msgEl.innerText = '';
      try {
        const res = await fetch('http://localhost:8081/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
              username: document.getElementById('username').value,
              password: document.getElementById('password').value
          })
        });
        const responseText = await res.text();
        let data = {};
        if (responseText) {
            try { data = JSON.parse(responseText); } catch(jsonErr) {}
        }
        if (!res.ok) {
            if (data.message === "Username not found!" || data.message === "Wrong password!") {
                throw new Error(data.message);
            }
            if (res.status === 401 || res.status === 403) {
                throw new Error("Incorrect username or password. Please try again.");
            }
            throw new Error("Unable to connect to the server right now.");
        }
        if (data.token) {
          localStorage.setItem('jwt', data.token);
          if (data.role === 'ROLE_ADMIN') {
              window.location.href = 'admin-dashboard.html';
          } else {
              window.location.href = 'search.html';
          }
        } else {
            throw new Error('Access token missing from response context.');
        }
      } catch(e) {
        msgEl.innerText = e.message;
      }
    }
</script>
</body>
</html>
